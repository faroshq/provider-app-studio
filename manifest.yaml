# App Studio provider — register with the kedge hub.
#
# App Studio gives tenants a persistent AI project workspace: project metadata,
# durable "memory" (goals/requirements/constraints), and a chat surface backed
# by the tenant's own LLM credentials, with optional MCP tool use against the
# workspace.
#
# Apply this against the kcp workspace where the kedge.faros.sh APIExport is
# bound (typically root:kedge:providers when running embedded kcp for
# development):
#
#   kubectl --kubeconfig kcp-admin.kubeconfig apply -f manifest.yaml
#
# For local dev the provider binary runs on the host (PORT=8085, see the
# Tiltfile run-provider-app-studio target) and the hub reverse-proxies both the
# portal bundle and the /api backend to the loopback URLs below. For in-cluster
# deployment, the Helm chart renders the Service DNS instead, e.g.
#   url: http://app-studio.app-studio.svc.cluster.local:8081
---
apiVersion: providers.kedge.faros.sh/v1alpha1
kind: CatalogEntry
metadata:
  name: app-studio
  annotations:
    providers.kedge.faros.sh/builtin: "false"
spec:
  displayName: "App Studio"
  description: "Persistent AI project workspace for planning, memory, and chat."
  vendor: "kedge"
  version: "0.1.0"
  category: "AI"
  iconURL: "/ui/providers/app-studio/icon.svg"
  serviceAccountNamespace: "app-studio"
  ui:
    # Dev loopback port (PORT / Tiltfile run-provider-app-studio). 8085 to
    # avoid colliding with quickstart (8081) and kuery (8084).
    url: "http://localhost:8085"
    indexPath: "/"
  backend:
    # The hub backend proxy forwards /services/providers/app-studio/* here,
    # injecting the verified X-Kedge-Tenant/X-Kedge-User headers and the
    # caller's bearer token. The provider serves /api/projects/* + /healthz.
    url: "http://localhost:8085"
    healthPath: "/healthz"

  apiExport:
    name: "ai.kedge.faros.sh"
    # App Studio stores per-workspace LLM credentials in a Secret in the
    # tenant workspace; the claim lets the provider read/write it as the
    # calling user.
    permissionClaims:
      - resource: secrets
        verbs: ["get", "list", "watch", "create", "update", "delete"]
        tenantScoped: true
    schemas:
      # Project: a persistent, tenant-authored AI workspace (metadata + memory).
      # The schema name embeds a content-version segment because kcp treats
      # APIResourceSchemas as immutable; a body change requires a new name.
      - groupResource: "projects.ai.kedge.faros.sh"
        body: |
          apiVersion: apis.kcp.io/v1alpha1
          kind: APIResourceSchema
          metadata:
            name: v260611-549aa6b.projects.ai.kedge.faros.sh
          spec:
            group: ai.kedge.faros.sh
            names:
              kind: Project
              listKind: ProjectList
              plural: projects
              shortNames:
              - proj
              singular: project
            scope: Cluster
            versions:
            - additionalPrinterColumns:
              - jsonPath: .spec.displayName
                name: DisplayName
                type: string
              - jsonPath: .status.phase
                name: Phase
                type: string
              - jsonPath: .status.updatedAt
                name: Updated
                type: date
              - jsonPath: .metadata.creationTimestamp
                name: Age
                type: date
              name: v1alpha1
              schema:
                description: Project is a persistent AI workspace scoped to a Kedge child workspace.
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  metadata:
                    type: object
                  spec:
                    description: ProjectSpec defines user-authored Project state.
                    properties:
                      description:
                        description: Description is a short project summary.
                        maxLength: 2048
                        type: string
                      displayName:
                        description: DisplayName is the human-readable project title.
                        maxLength: 128
                        minLength: 1
                        type: string
                      memory:
                        description: >-
                          Memory stores durable context the AI should consider for
                          this project. It is edited explicitly through the API.
                        properties:
                          constraints:
                            items:
                              type: string
                            type: array
                          goals:
                            items:
                              type: string
                            type: array
                          requirements:
                            items:
                              type: string
                            type: array
                        type: object
                    required:
                    - displayName
                    type: object
                  status:
                    description: ProjectStatus defines the observed Project state.
                    properties:
                      phase:
                        description: Phase is Ready for MVP-created Projects.
                        type: string
                      updatedAt:
                        description: >-
                          UpdatedAt reflects the latest API mutation affecting
                          metadata or memory.
                        format: date-time
                        type: string
                    type: object
                type: object
              served: true
              storage: true
              subresources:
                status: {}
