kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: projects.ai.kedge.faros.sh
spec:
  group: ai.kedge.faros.sh
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    shortNames:
    - proj
    singular: project
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.updatedAt
      name: Updated
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Project is a persistent AI workspace scoped to a Kedge child
          workspace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProjectSpec defines user-authored Project state.
            properties:
              description:
                description: Description is a short project summary.
                maxLength: 2048
                type: string
              displayName:
                description: DisplayName is the human-readable project title.
                maxLength: 128
                minLength: 1
                type: string
              environments:
                description: |-
                  Environments describe provider-backed runtime capabilities for this
                  Project. App Studio owns the binding contract; providers own runtime
                  implementation details.
                items:
                  properties:
                    autoDeploy:
                      description: AutoDeploy marks artifact environments that should
                        deploy automatically.
                      type: boolean
                    bindings:
                      description: Bindings connect this environment to provider capabilities.
                      items:
                        properties:
                          kind:
                            type: string
                          name:
                            maxLength: 63
                            minLength: 1
                            type: string
                          provider:
                            maxLength: 63
                            minLength: 1
                            type: string
                          resourceRef:
                            properties:
                              apiVersion:
                                type: string
                              kind:
                                type: string
                              name:
                                type: string
                              resource:
                                type: string
                            type: object
                          values:
                            description: |-
                              Values is provider-owned configuration. App Studio treats it as an
                              opaque contract payload.
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                        required:
                        - kind
                        - name
                        - provider
                        type: object
                      type: array
                    mode:
                      description: |-
                        Mode distinguishes artifact-based environments from live development
                        runtimes. Empty means artifact for backward compatibility.
                      type: string
                    name:
                      description: Name is a stable environment identifier such as
                        development or test.
                      maxLength: 63
                      minLength: 1
                      type: string
                    promotion:
                      description: Promotion controls how changes move into this environment.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              memory:
                description: |-
                  Memory stores durable context the AI should consider for this
                  project. It is edited explicitly through the API in the MVP.
                properties:
                  constraints:
                    items:
                      type: string
                    type: array
                  goals:
                    items:
                      type: string
                    type: array
                  requirements:
                    items:
                      type: string
                    type: array
                type: object
              repository:
                description: Repository records the Code provider repository backing
                  this Project.
                properties:
                  connectionRef:
                    description: ConnectionRef names the Code provider Connection
                      used by the Repository.
                    maxLength: 253
                    type: string
                  name:
                    description: Name is the repository name on the git host.
                    maxLength: 253
                    type: string
                  repositoryRef:
                    description: RepositoryRef names the Repository resource in the
                      same workspace.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
