nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/faroshq/kedge/app-studio-provider
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8081

catalogEntry:
  enabled: true
  uiURL: ""
  backendURL: ""

# App Studio chat-message persistence. Prefer databaseURLSecretRef in
# production; inMemoryMessageStore is for local development only.
store:
  databaseURL: ""
  databaseURLSecretRef:
    name: ""
    key: database-url
  inMemoryMessageStore: false
  # Retention window understood by Go's time.ParseDuration, e.g. "720h".
  messageRetention: ""
  messageEncryptionKeysSecretRef:
    name: ""
    key: keys

hub:
  url: "http://kedge-hub.kedge.svc.cluster.local:8080"
  insecure: false
  tokenSecretRef:
    name: ""
    key: token

podLabels: {}
podAnnotations: {}
resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
