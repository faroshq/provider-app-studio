nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/faroshq/kedge/app-studio-provider
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8081

# When true, the chart renders the CatalogEntry (which registers the provider
# with the hub) into a ConfigMap that the init container applies into the
# provider workspace via the provider kubeconfig. The CatalogEntry is a kcp
# resource, so it is NOT applied to the hosting cluster this chart installs into.
# Set to false to manage the CatalogEntry separately (e.g. GitOps with a
# different rollout cadence).
catalogEntry:
  enabled: true
  renderAsConfigMap: true
  uiURL: ""
  backendURL: ""

# Secret holding the workspace-admin kubeconfig minted by the platform admin
# via /bonkers (admin onboarding). Consumed by both the init container and the
# serve container. Key must be "kubeconfig".
providerKubeconfig:
  secretName: kedge-provider-kubeconfig

# App Studio no longer holds a kubeconfig to the runtime cluster. The sandbox
# data plane (sync, logs, restart, preview readiness) is served by the
# infrastructure provider as subresources on the SandboxRunner instance, reached
# through the hub as the calling user. See docs/app-studio-runtime-decoupling.md.

# Images passed into infrastructure-backed SandboxRunner resources. App Studio
# creates a SandboxRunner for every project, and its spec requires both images,
# so the chart fails the install when either is unset (independent of the
# runtime kubeconfig). They are empty by default so installs do not silently
# trust mutable development tags — set both to immutable digest references.
sandboxRunner:
  runnerImage: ""
  tokenGeneratorImage: ""

# Optional preview route deployment settings and companion infrastructure binding.
# If baseDomain is empty, App Studio does not add the SandboxPreviewHTTPRoute
# companion binding for new projects.
previewGateway:
  # Master switch: when true and baseDomain is set, the companion route is
  # enabled, the provider emits APP_STUDIO_PREVIEW_HTTPROUTE_* env vars, and the
  # chart creates a preview-gateway workload.
  enabled: true
  baseDomain: ""
  # Parent Gateway references (host traffic fan-in).
  parentGateway:
    name: "kedge-preview"
    namespace: "kedge-preview"
    sectionName: "https"
  # Shared preview-gateway Service reached by all HTTPRoute resources.
  # When namespace is unset, the chart uses the Helm release namespace. When
  # serviceName is unset, the chart uses its rendered preview-gateway service
  # name.
  backend:
    namespace: ""
    serviceName: ""
    servicePort: 8080
  # Dedicated workload that runs `app-studio preview-gateway`.
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  serviceAccount:
    create: true
    name: ""
  resources: {}
  rbac:
    create: true

# Optional shared secret for signed preview URLs. When unset, the pod generates
# an in-memory secret on startup; configure this for multi-replica deployments.
previewTokenSecretRef:
  name: ""
  key: token

# App Studio chat-message persistence. Prefer databaseURLSecretRef in
# production; inMemoryMessageStore is an explicit non-durable fallback only.
store:
  databaseURL: ""
  databaseURLSecretRef:
    name: ""
    key: database-url
  inMemoryMessageStore: false
  # Retention window understood by Go's time.ParseDuration, e.g. "720h".
  messageRetention: ""
  messageEncryptionKeysSecretRef:
    name: ""
    key: keys

# App Studio project workspaces. The provider stores checked-out/generated
# project files here so the agent can list, read, search, and later mutate them.
workspace:
  path: /var/lib/kedge-app-studio/workspaces
  existingClaim: ""
  emptyDir: false
  persistence:
    enabled: true
    size: 1Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""

hub:
  url: "http://kedge-hub.kedge.svc.cluster.local:8080"
  insecure: false
  tokenSecretRef:
    name: ""
    key: token

podLabels: {}
podAnnotations: {}
podSecurityContext:
  fsGroup: 65532
resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
