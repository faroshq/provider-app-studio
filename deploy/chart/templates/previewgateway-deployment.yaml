{{- $previewGatewayEnabled := .Values.previewGateway.enabled | default false -}}
{{- $previewGatewayBaseDomain := .Values.previewGateway.baseDomain | default "" -}}
{{- $previewGatewayName := printf "%s-preview-gateway" (include "appstudio.fullname" .) | trunc 63 | trimSuffix "-" -}}
{{- $previewGatewayServiceAccountName := ternary (default $previewGatewayName .Values.previewGateway.serviceAccount.name) (default "default" .Values.previewGateway.serviceAccount.name) (.Values.previewGateway.serviceAccount.create) -}}
{{- if and $previewGatewayEnabled (ne (trim $previewGatewayBaseDomain) "") -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $previewGatewayName }}
  labels:
    app.kubernetes.io/name: {{ include "appstudio.name" . }}-preview-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
spec:
  replicas: {{ .Values.previewGateway.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "appstudio.name" . }}-preview-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "appstudio.name" . }}-preview-gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    spec:
      serviceAccountName: {{ $previewGatewayServiceAccountName }}
      containers:
        - name: preview-gateway
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["preview-gateway"]
          ports:
            - name: http
              containerPort: {{ .Values.previewGateway.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
          env:
            - name: PORT
              value: {{ .Values.previewGateway.service.port | quote }}
            {{- if .Values.previewTokenSecretRef.name }}
            - name: APP_STUDIO_PREVIEW_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.previewTokenSecretRef.name }}
                  key: {{ .Values.previewTokenSecretRef.key }}
            {{- end }}
          resources:
            {{- toYaml .Values.previewGateway.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
