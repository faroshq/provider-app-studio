{{- $catalogEntryConfigMap := and .Values.catalogEntry.enabled .Values.catalogEntry.renderAsConfigMap -}}
{{- $previewGatewayEnabled := .Values.previewGateway.enabled | default false -}}
{{- $previewGatewayBaseDomain := .Values.previewGateway.baseDomain | default "" -}}
{{- $previewGatewayFeatureEnabled := and $previewGatewayEnabled (ne (trim $previewGatewayBaseDomain) "") -}}
{{- $previewGatewayServiceName := printf "%s-preview-gateway" (include "appstudio.fullname" .) | trunc 63 | trimSuffix "-" -}}
{{- if and $previewGatewayFeatureEnabled (not .Values.previewTokenSecretRef.name) -}}
{{- fail "previewGateway is enabled with baseDomain, but previewTokenSecretRef.name is required for shared preview tokens" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "appstudio.fullname" . }}
  labels:
    {{- include "appstudio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "appstudio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "appstudio.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "appstudio.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Bootstrap the provider workspace (schemas, APIExport, slice, bind
        # grant) with the onboarded workspace-admin kubeconfig. Schemas baked at
        # /etc/kedge/schemas (Dockerfile). Idempotent.
        - name: init
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["init"]
          env:
            - name: KEDGE_PROVIDER_KUBECONFIG
              value: /var/run/secrets/kedge/kedge-provider-kubeconfig
            - name: KEDGE_SCHEMAS_DIR
              value: /etc/kedge/schemas
            {{- if $catalogEntryConfigMap }}
            # The CatalogEntry is a kcp resource, so the chart cannot apply it to
            # the hosting cluster. It is rendered into a ConfigMap (mounted below)
            # and init self-registers it into the provider workspace via the
            # provider kubeconfig.
            - name: KEDGE_CATALOGENTRY_FILE
              value: /etc/kedge/catalogentry/catalogentry.yaml
            {{- end }}
          volumeMounts:
            - name: kedge-provider-kubeconfig
              mountPath: /var/run/secrets/kedge
              readOnly: true
            {{- if $catalogEntryConfigMap }}
            - name: catalogentry
              mountPath: /etc/kedge/catalogentry
              readOnly: true
            {{- end }}
      containers:
        - name: provider
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
          env:
            - name: PORT
              value: "8081"
            - name: KEDGE_HUB_URL
              value: {{ .Values.hub.url | quote }}
            - name: KEDGE_PROVIDER_NAME
              value: "app-studio"
            # Provider kubeconfig — used for the kcp front-proxy host + TLS
            # only; the tenant client drops its credential and acts as the
            # calling user via the forwarded bearer token.
            - name: KEDGE_PROVIDER_KUBECONFIG
              value: /var/run/secrets/kedge/kedge-provider-kubeconfig
            {{- if $previewGatewayFeatureEnabled }}
            - name: APP_STUDIO_PREVIEW_BASE_DOMAIN
              value: {{ $previewGatewayBaseDomain | quote }}
            - name: APP_STUDIO_PREVIEW_HTTPROUTE_PARENT_GATEWAY_NAME
              value: {{ .Values.previewGateway.parentGateway.name | quote }}
            - name: APP_STUDIO_PREVIEW_HTTPROUTE_PARENT_GATEWAY_NAMESPACE
              value: {{ .Values.previewGateway.parentGateway.namespace | quote }}
            - name: APP_STUDIO_PREVIEW_HTTPROUTE_PARENT_GATEWAY_SECTION_NAME
              value: {{ .Values.previewGateway.parentGateway.sectionName | quote }}
            - name: APP_STUDIO_PREVIEW_BACKEND_NAMESPACE
              value: {{ default .Release.Namespace .Values.previewGateway.backend.namespace | quote }}
            - name: APP_STUDIO_PREVIEW_BACKEND_SERVICE_NAME
              value: {{ default $previewGatewayServiceName .Values.previewGateway.backend.serviceName | quote }}
            - name: APP_STUDIO_PREVIEW_BACKEND_SERVICE_PORT
              value: {{ .Values.previewGateway.backend.servicePort | quote }}
            {{- end }}
            - name: APP_STUDIO_WORKSPACE_ROOT
              value: {{ .Values.workspace.path | quote }}
            {{- if .Values.previewTokenSecretRef.name }}
            - name: APP_STUDIO_PREVIEW_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.previewTokenSecretRef.name }}
                  key: {{ .Values.previewTokenSecretRef.key }}
            {{- end }}
            {{- if .Values.store.databaseURL }}
            - name: APP_STUDIO_DATABASE_URL
              value: {{ .Values.store.databaseURL | quote }}
            {{- else if .Values.store.databaseURLSecretRef.name }}
            - name: APP_STUDIO_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.store.databaseURLSecretRef.name }}
                  key: {{ .Values.store.databaseURLSecretRef.key }}
            {{- end }}
            {{- if .Values.store.inMemoryMessageStore }}
            - name: APP_STUDIO_IN_MEMORY_MESSAGE_STORE
              value: "true"
            {{- end }}
            {{- if .Values.store.messageRetention }}
            - name: APP_STUDIO_MESSAGE_RETENTION
              value: {{ .Values.store.messageRetention | quote }}
            {{- end }}
            {{- if .Values.store.messageEncryptionKeysSecretRef.name }}
            - name: APP_STUDIO_MESSAGE_ENCRYPTION_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.store.messageEncryptionKeysSecretRef.name }}
                  key: {{ .Values.store.messageEncryptionKeysSecretRef.key }}
            {{- end }}
            {{- if .Values.hub.insecure }}
            - name: KEDGE_HUB_INSECURE
              value: "true"
            {{- end }}
            {{- if .Values.hub.tokenSecretRef.name }}
            - name: KEDGE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hub.tokenSecretRef.name }}
                  key: {{ .Values.hub.tokenSecretRef.key }}
            {{- end }}
          volumeMounts:
            # The onboarded workspace-admin kubeconfig; the SA token inside is
            # what the tenant client presents to reach tenant workspaces.
            - name: kedge-provider-kubeconfig
              mountPath: /var/run/secrets/kedge
              readOnly: true
            - name: project-workspaces
              mountPath: {{ .Values.workspace.path | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        # Required input: the workspace-admin kubeconfig minted via /bonkers
        # (admin onboarding), consumed by both init and serve. The onboard
        # response stores it under key "kubeconfig"; map it to the file path the
        # provider reads.
        - name: kedge-provider-kubeconfig
          secret:
            secretName: {{ .Values.providerKubeconfig.secretName }}
            items:
              - key: kubeconfig
                path: kedge-provider-kubeconfig
        {{- if $catalogEntryConfigMap }}
        - name: catalogentry
          configMap:
            name: {{ include "appstudio.fullname" . }}-catalogentry
        {{- end }}
        - name: project-workspaces
          {{- if .Values.workspace.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.workspace.existingClaim | quote }}
          {{- else if or .Values.workspace.emptyDir (not .Values.workspace.persistence.enabled) }}
          emptyDir: {}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "appstudio.fullname" . }}-workspaces
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
