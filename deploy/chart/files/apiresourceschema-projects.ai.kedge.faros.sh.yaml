spec:
  group: ai.kedge.faros.sh
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    shortNames:
    - proj
    singular: project
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: DisplayName
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.updatedAt
      name: Updated
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      description: Project is a persistent AI workspace scoped to a Kedge child workspace.
      properties:
        apiVersion:
          description: |-
            APIVersion defines the versioned schema of this representation of an object.
            Servers should convert recognized schemas to the latest internal value, and
            may reject unrecognized values.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
          type: string
        kind:
          description: |-
            Kind is a string value representing the REST resource this object represents.
            Servers may infer this from the endpoint the client submits requests to.
            Cannot be updated.
            In CamelCase.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
          type: string
        metadata:
          type: object
        spec:
          description: ProjectSpec defines user-authored Project state.
          properties:
            description:
              description: Description is a short project summary.
              maxLength: 2048
              type: string
            displayName:
              description: DisplayName is the human-readable project title.
              maxLength: 128
              minLength: 1
              type: string
            memory:
              description: |-
                Memory stores durable context the AI should consider for this
                project. It is edited explicitly through the API in the MVP.
              properties:
                constraints:
                  items:
                    type: string
                  type: array
                goals:
                  items:
                    type: string
                  type: array
                requirements:
                  items:
                    type: string
                  type: array
              type: object
            repository:
              description: Repository records the Code provider repository backing
                this Project.
              properties:
                connectionRef:
                  description: ConnectionRef names the Code provider Connection used
                    by the Repository.
                  maxLength: 253
                  type: string
                name:
                  description: Name is the repository name on the git host.
                  maxLength: 253
                  type: string
                repositoryRef:
                  description: RepositoryRef names the Repository resource in the
                    same workspace.
                  maxLength: 253
                  minLength: 1
                  type: string
              required:
              - repositoryRef
              type: object
            runtime:
              description: |-
                Runtime records the runtime provider attached to this Project. Runtime
                providers own process state, logs, preview URLs, and deployment targets.
              properties:
                providerRef:
                  description: ProviderRef names the runtime provider implementation
                    or capability.
                  maxLength: 253
                  minLength: 1
                  type: string
                runtimeRef:
                  description: RuntimeRef names the runtime provider-owned resource
                    for this Project.
                  maxLength: 253
                  type: string
                target:
                  description: |-
                    Target identifies the provider-specific runtime target, such as local,
                    kubernetes, cloud-run, or lambda.
                  maxLength: 128
                  type: string
              required:
              - providerRef
              type: object
          required:
          - displayName
          type: object
        status:
          description: ProjectStatus defines the observed Project state.
          properties:
            phase:
              description: Phase is Ready for MVP-created Projects.
              type: string
            updatedAt:
              description: UpdatedAt reflects the latest API mutation affecting metadata
